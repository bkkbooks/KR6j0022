body:
  text: 二手當心合掌屈二頭指中節橫相跓以二大母指並押二頭指上節如劍形結此印即觀自心中有八葉蓮華於華中想阿上字放金色光與印相應想彼阿上字了一切法本來不生即誦真言曰娜莫三滿多母馱引南引惡引尾引羅吽引欠次誦真言八遍以印如前加持自身五處所謂額右肩左肩心喉頂上散一字頂輪王印先合掌以左右二無名指二小指右押左相刃入掌二中指直竪屈第一節頭相跓如劍形二大指入掌平伸二頭指屈押二大指甲頭相跓名頂輪王根本印頌曰此印摩訶印所謂如來頂適才結作之即同於世尊頂輪王真言曩莫三滿多母馱南引唵若有祈請所求一切事者於此應加孔雀王陀羅尼部嚕唵三合次結孔雀王印以二手內相刃直竪檀慧頭相跓禪智亦直竪並相跓其印即成誦真言三遍或七遍與頂輪王合誦應加此真言句誦真言曰唵摩庾攞引迦蘭二合帝􅁥娑嚩二合引賀若以尋常持念一字頂輪王真言須別誦孔雀王真言亦須別誦此加句法親於阿闍梨所以口傳授之修瑜伽者知耳金剛解脫真言唵嚩日囉二合謨乞叉二合穆葉衣觀世音菩薩真言曰唵跛哩娜二合捨嚩哩吽發吒智矩如來真言曩謨引阿瑟吒二合始底南三藐三沒馱引矩二引胝南唵枳娘二合引曩嚩婆引細地哩地哩吽大悲隨心真言唵鉢怛麼二合左訖囉二合商佉誐那引馱引囉𩕳儞攞建姹二合悉地也二合悉地也二合吽多羅菩薩真言唵跢引哩都跢引哩覩哩哩娑嚩二合賀引如來袈裟真言唵𡀩乞叉二合薩􅞣嚩沒馱地失恥二合跢引怛麼二合紫嚩囉􅁥娑嚩二合賀一字頂輪部嚕唵三合金剛延命真言唵嚩日囉二合喻曬娑嚩二合引賀金剛命真言唵砧嚩日囉二合欲金剛王真言唵吒計吽引惹白傘蓋佛頂真言唵麼麼吽䁥毗盧遮那佛真言唵部律二合阿尾囉吽引欠光聚佛頂真言唵佉佉佉係佉係吽吽入嚩二合囉鉢囉二合入嚩二合囉鉢囉二合入嚩二合囉底瑟吒二合底瑟吒紇哩瑟胝四合薩泮吒􅁥娑嚩二合賀觀自在菩薩真言唵紇哩郝吽泮吒不空羂索心真言唵阿謨誐引鉢囉二合底賀跢吽泮吒虛空藏滿願真言唵薩􅞣嚩怛他蘖多引鞞迦嚩日囉囉􅑈怛那二合薩􅞣嚩引舍跛哩布囉迦惹吽鑁斛怛覽虛空藏三昧耶真言唵嚩日囉二合囉􅑈怛娜二合吽虛空藏真言唵誐誐曩三婆嚩嚩日囉斛唵惡吽虛空藏羯麼真言唵嚩日囉囉􅑐怛奴二合憾文殊八字真言阿尾囉吽引佉左𡀩曇文殊菩薩六字真言唵嚩計娜曩莫孔雀王真言曩謨諦吒半音囉囉􅁥娑嚩二合引賀引普賢菩薩陀囉尼曰唵三漫多婆去捺囉二合􅁥娑嚩二合賀引除毒真言曰唵阿拏哩跛拏哩娜引誐麼哩儞吽泮吒􅁥娑嚩二合引賀菩提心真言唵地唧哆沒怛跛娜也弭下𮇏陀羅尼曰唵嚩日囉二合質怛囉二合三麼曳吽文殊師利菩薩陀羅尼曩謨阿引去􅝪哩也二合曼視室哩二合曳地薩怛嚩二合野怛儞也二合他惹曳惹野臘吠惹野麼賀摩係娑嚩二合賀引祈雨助頂輪加持日真言唵部嚕唵三合阿去引儞顛誐囉迦上鼻艷二合吽發吒金剛大輪陀羅尼曰曩麼悉半音嘻哩二合耶墜迦去南去跢多伽陀去南上二唵三鞞囉去時鞞囉去時四摩訶斫迦囉二合嚩日哩五薩多薩多娑囉上帝娑囉上帝怛囉曳怛囉曳毗陀麼儞九三盤誓儞十怛囉上麼底上二悉陀揭唎怛囑炎十二三合􅁥娑嚩二合引賀引懺悔滅罪真言唵薩􅞣嚩跛引波捺賀引曩嚩日囉二合野􅁥娑嚩二合引賀引浴像偈我今灌沐諸如來淨智功德莊嚴聚願彼五濁衆生類速證如來淨法身決暯偈諸佛今為汝決除無智暯猶如世醫王我今亦如是次結佛眼印以二手合掌二大拇指雙屈入掌二頭指輔二中指第一節背如兩眼相對是名佛眼印成已加持五處所謂額右肩左肩心喉頂上散誦真言曰曩莫薩􅞣嚩怛他去引誐帝毗廋二合引一􅟓囉賀二合毗藥二合二三去藐三沒弟毗藥二合三唵四嚕嚕娑普二合嚕五入嚩二合攞底丁以反瑟姹二合六悉馱路引左寧七薩􅞤嚩􅚼唎他二合娑馱𩕳八􅁥娑嚩二合引賀引次結大日如來劍印以二手當心合掌屈二頭指中節橫相跓以二大拇指並押二頭指上節如劍形結此印已即觀自心中有八葉蓮華於蓮華中想阿字放金色光與印相應想彼上字了一切法本來不生即誦真言曰曩莫三去滿多母馱引南引惡引尾引囉吽引欠次誦真言八遍以印如前加持自身五處所謂額右肩左肩心喉於頂上散印次以軍荼利心真言遍護諸物去垢清淨誦真言曰唵阿上蜜㗚二合帝吽引發吒半音以右手掬淨水加持七遍用灑澡豆等物便成清淨次誦軍荼唎根本真言及密印攬水其印平展慧臂屈方願二度入掌以智度捻二度甲上慧度拳於方度節側力度拳於願度節側以此印攬水誦根本真言七遍加持然後解衣隨意澡浴真言曰曩莫引囉􅑈怛曩二合怛囉二合夜引野娜莫􅁒室戰二合拏摩賀引嚩日囉二合引矩嚕二合引馱引野三唵護嚕護嚕四底丁以反瑟姹二合底瑟姹二合五滿馱滿馱六賀曩賀曩阿蜜㗚二合帝吽引發吒半音娑嚩二合賀引凡澡浴法三分別洗須知次第前後從足至臍為下分從臍至頸名中分從頸至頂為上分應先洗下分淨已即以皂莢澡豆淨手次洗中分又淨洗手次注上分本經云凡澡洗時寂然一心持念不應散亂亦不戲笑及無義談話亦勿視隱密處亦不應思念男女等欲事但為去垢故而為澡浴勿作嚴身之想一心明記次第如法護持亦不應嗔呵大小設有不如意事應慈心善言教示如是依教如法浴竟次應灌頂以此真言加持淨瓶用灌其頂真言曰唵鸖佉哩哩吽引發吒半音若自加持但誦真言二十一遍即得若便同伴或知法弟子加持滿一百八遍如無瓶或無人但以此印掬水每掬水加持誦真言七遍三度掬水如法加持自灌其頂其印以檀慧右押左相叉入掌以戒方雙屈並押交上以忍願直竪頭相跓以進力屈跓忍願背上節禪智並竪即成此名灌頂印次以前大三昧耶真言言及印如前加持自身五處如前次以軍荼利心如前掬水加持灑於所著衣上令其清淨然後取著仍須自誦吉祥伽陀不應間斷直至本所座處心想以此清淨身心禮事供養一切諸佛便入道場供養如大教中説依蘇悉地經及金剛頂經略鈔解諸觸穢加持三業法夫淨三業者或時身有觸穢或口有食噉及説諸雜語言或時心中思惟不饒益事等皆名三業不淨故須以此陀羅尼及正觀加持令罪垢消除身語意業速得清淨真言曰唵􅁤娑嚩二合婆去引嚩秫詩律反馱引薩􅞣嚩達􅝞磨引􅁤娑嚩二合婆嚩去引秫度引憾次誦真言七遍彌多益善此真言能除身語意業一切罪垢皆得清淨正誦之時應入此瑜伽觀思惟一切諸法本性清淨但為虛妄客塵煩惱所覆迷失正理故有顛倒妄執善惡業果我今入法界平等不思議觀了知一切煩惱罪垢本來清淨又以陀羅尼不思議力一切諸佛共以神通加持相應力故應時煩惱妄想皆得清淨何以故了彼煩惱彼虛妄生無自性故如幻如夢本來清淨作此瑜伽正觀及祕密加持一切惡業無不清淨本經中名為祕密內澡浴法凡解穢法有二種穢一者欲入觸穢處即以烏芻澀麼忿怒真言誦真言七遍能辟除一切穢惡不著身心以此加持身如忿怒金剛毗那夜迦不能得便烏芻澀麼忿怒王真言曰唵矩嚕二合引馱曩吽引弱自落反二者久持誦人身心清淨忽然不覺悟被觸穢或食著穢食或著穢衣或穢觸陵突自覺身心不安之時當須速以灰水摩洗一金銀器或白瓷器取少許新汲水以軍荼唎真言加持七遍或二十一遍或一百八遍然飲之應時即定如湯雪此真言名解觸穢此二真言具列軍吒唎軌真言曰曩謨引囉􅑈怛曩二合怛囉夜引野娜莫室戰二合拏摩賀嚩日囉二合矩嚕二合引馱引野唵護嚕護嚕底瑟姹二合底瑟姹二合滿馱滿馱賀曩賀曩阿蜜㗚二合帝吽引發吒半音􅁥娑嚩二合賀引佛部心三昧耶印以止觀十度內相叉作拳以禪智並竪結印成已觀諸佛遍虛空即誦真言三遍頂上散印誦真言曰唵爾曩爾迦半音􅁥娑嚩二合引賀引次結蓮華部三昧耶印準前佛部心印智度屈入掌直竪禪度結印成已想於一切如來右邊有觀自在菩薩并諸眷屬即誦真言三遍頂右散印誦真言曰唵阿去引嚧引力迦半音􅁥娑嚩二合引賀次結金剛部心三昧耶印準前佛部心印以禪度屈入掌直竪智度想於一切如來左邊有金剛手菩薩并諸眷屬即誦真言三遍頂左散印誦真言曰唵嚩日囉二合地力二合迦半音娑嚩二合引賀次結被甲護身印以觀羽禪度橫於掌內以進忍戒檀四度握拳結印成已加持五處所謂額右肩左肩心喉是名為五處護身真言曰唵部引入嚩二合囉吽一字頂輪王辟除印以左右頭指無名指小指右押左相叉入掌作拳二大指雙屈入掌二中指直竪頭相跓結印成已於頂上左轉三匝是辟除右轉三匝是結護想心所到便成界方此印能破障一切佛頂法事若一切惡天龍八部藥叉羅剎阿修羅迦樓羅緊那羅摩呼羅伽毗那夜迦倫見是印悉皆怖走辟除誦真言曰曩莫三滿多母馱引南引唵引奴嚕唵二合滿馱􅁥娑嚩二合引賀引次獻閼伽真言曰曩莫三滿多母馱引南引誐誐曩三摩穇去麼􅁥娑嚩二合引賀引以二手捧器當額䠒跪誦真言三遍奉閼伽沐浴聖衆次結普通供養印曩莫三滿多母馱南薩􅞣嚩他引欠嗢娜蘖二合帝娑頗二合囉呬𤚥誐誐曩劍娑嚩二合引賀由此真言威力流出一切燈明雲海供養一切如來及諸聖衆復觀想幢幡蓋網瓔珞衣服繒綵等物遍諸供養雲海無邊法界以誠實言誦妙伽陀而讚之曰以我功德力如來加持力及以法界力普供養而住次結佛大慈護印以十度相叉作為月禪智檀慧竪相著結印成已印心額喉頂上散印誦真言曰唵沒馱昧底哩二合嚩日囉二合落乞灑二合憾􅁥娑嚩二合引賀引次結佛眼印以二手合掌二大拇指雙屈入掌二頭指輔二中指第一節背如兩眼相對是名佛眼印成已加持五處所謂額右肩左肩心喉頂上散印真言曰曩莫薩􅞣嚩怛他去誐帝毗庾二合引􅟓囉賀二合毗藥二合一三藐三沒弟毗藥二合二唵四嚕嚕娑普二合嚕五入嚩二合囉底瑟𡛥二合六悉馱路引左寧七薩􅞣嚩􅚼唎他二合娑馱𩕳八􅁥娑嚩二合引賀次結一字頂輪王印先合掌以左右二無名指二小指右押左相叉入掌二中指直竪屈第一節頭相跓如劍形二大指入掌平伸二頭指屈押二大指甲頭相跓名頂輪王根本印頌曰此印摩訶印所謂如來頂適才結作之即同於世尊真言曰曩莫三滿多母馱南引唵若有祈請所求一切事者於此應加孔雀王陀羅尼部嚕唵三合次孔雀王印以二手內相叉直竪檀慧頭相跓禪智亦直竪並相跓其印即成誦真言三遍或七遍與頂輪王合誦應加此真言句誦真言曰唵摩庾攞引迦蘭二合帝􅁥娑嚩二合引賀若以尋常持念一字頂輪王真言須別誦孔雀王真言亦須別誦此加句法親於阿闍梨所以口傳傳授之修瑜伽者知耳復説祈雨壇法若天亢旱時欲祈請雨者於露地作壇除去瓦礫及諸穢物張設青幕懸青幡香埿塗拭作一方壇於壇中畫七寶水池池中畫海龍王宮於龍宮中有釋迦牟尼如來住説法相佛右畫觀自在菩薩佛左畫金剛手菩薩等侍衛於佛前右畫三千大千世界主輪蓋龍王佛前左畫難陀跋難陀二龍王於壇四方用瞿摩夷汁各畫一龍王於東方畫一龍王一身三頭量三肘并眷屬圍繞又於南方畫一龍王一身五頭量長五肘并諸眷屬又於西方畫一龍王一身七頭量七肘并諸眷屬圍繞又於北方畫一龍王一身九頭量長九肘并諸眷屬圍繞皆在靉靆青黑雲中半身以下如蛇形尾在池中半身以上如菩薩形皆合掌從池涌出於壇四角置四清水瓶隨其力分飲食果子等皆作深青色以淨布列供養燒香散青色華道場中所用物皆作青色祈雨之人若是出家苾芻應具律儀若是俗士應受八戒作法之時喫三白食每日香湯沐浴著新淨青衣於壇西面以青物為座即以香塗手先應三密加持護自身及壇上案上置此大雲經於持一切有情起大慈悲心志誠請一切佛菩薩加持晝夜虔誠讀此大雲經或二人三人乃至七人更替讀誦經聲不應間斷亢旱之時如是依法誦此大雲經或一日二日乃至七日決定降注甘雨若災重不雨更作亦降雨假令大海或過限越潮依此經作法轉讀無不應知應發願讀經所生功德回向諸龍願皆離諸苦難發無上菩提心為一切有情降注甘雨密經所居之處去村邑等處也唵誐誐阿帝誐誐娑嚩二合賀引金剛解脫真言唵嚩日囉謨乞叉二合穆葉衣觀世音菩薩真言曰唵跛哩娜二合捨嚩哩吽發吒智炬如來真言曰曩謨引阿瑟吒三合始底南三藐三沒馱引矩引胝南唵枳娘二合引曩嚩婆引細地哩吽大悲隨心真言唵鉢怛麼二合左訖囉二合商佉誐那引馱引囉𩕳儞攞建吒二合悉地也二合悉地也吽無量壽如來心真言唵阿密㗚二合多帝際賀囉吽多羅菩薩真言唵跢引哩覩跢引哩覩哩娑嚩二合賀引如來袈裟真言唵𡀩乞叉二合薩􅞣嚩沒馱地失恥二合跢引怛麼二合紫嚩囉􅁥娑嚩二合引賀大日經略攝念誦行法稽首無礙智密教意生子依彼蘇多羅攝此隨行法真言行菩薩先住平等誓語密身密俱後作相應行三昧耶真言曩謨三曼多勃馱喃唵阿三謎底哩二合三謎三摩曳􅁥娑嚩二合賀契謂齊輪合並建於二空五處頂肩心最後加咽位次以不動聖私云此念誦行法全同世流布本故略之也八轉聲者體業作具所為從屬依呼是也且釋者體聲者如菩薩摩訶薩等是體聲呼也二業聲者如前菩薩修行無所得觀業聲也三作具聲者如何菩薩修行無所得觀謂用般若波羅蜜多是作具聲也四所為聲者為何修行謂為度一切衆生為聲也五從聲者從何修行謂從諸佛出現於世演説正法是從聲也六屬聲者誰之無所得一切法之無所得是屬聲也七依聲者於何修行依三賢十地等是依聲也八呼聲者謂上來呼召名言是呼聲也此下有六離合釋全同世布流文相是故略之此次有摩利支菩薩略念誦法則大興善寺三藏沙門大廣智不空所譯也是又全同世流布本是故略之也摩利支經一卷是又今略之次有金剛頂經瑜伽三十七尊三昧耶真言如次第列之今又略之金剛頂瑜伽大教王經十六大菩薩讚金剛手嚩日囉二合薩埵嚩二合摩訶引薩怛嚩二合嚩日囉二合薩􅞣嚩怛他引誐多三滿多婆𢴉囉二合嚩日囉二合儞也二合嚩日囉二合幡引膩曩謨娑都二合帝金剛王嚩日囉二合囉引惹引素沒馱引擬哩二合嚩日囉二合引俱引捨多他引誐多阿謨引佉囉引惹嚩日囉二合儞也二合嚩日囉二合羯􅞻㗚灑二合曩謨引娑都二合帝金剛愛嚩日囉二合囉誐摩訶引掃引俱也二合嚩日囉二合引嚩拏嚩商迦上囉摩引囉迦引摩摩訶嚩日囉引左波曩謨引娑都二合帝金剛喜嚩日囉二合娑引徒蘇嚩日囉二合誐囉也嚩日囉二合引都瑟智二合摩訶引囉帝鉢囉二合引謨儞也二合囉惹引嚩日囉二合訶􅞻㗚灑二合曩謨娑都二合帝金剛寶嚩日囉二合囉􅑈怛那二合素嚩日囉二合􅚼㗚他二合嚩日囉二合迦引舍摩訶引摩膩阿引去迦引舍蘖􅝑婆嚩日囉二合擲也二合嚩日囉二合蘖􅝑婆曩謨引娑都二合帝金剛光嚩日囉二合引帝惹引摩訶引入嚩二合囉嚩日囉二合引素􅝩哩也二合爾引曩鉢羅二合婆嚩日囉二合囉􅊶濕弭二合摩訶引帝惹引嚩日囉二合鉢囉二合婆曩謨已下梵漢如上次下皆略金剛幢嚩日囉二合引計都蘇薩怛嚩二合引􅚼㗚他二合嚩日囉二合引墮嚩二合惹素覩引灑迦囉􅑈怛娜二合計都摩訶嚩日囉二合引野瑟智曳二合金剛笑嚩日囉二合訶引薩摩訶引賀娑嚩日囉二合引􅊶悉弭二合多摩訶引娜部二合多鉢哩二合底鉢囉二合謨引儞也二合嚩日囉二合鉢哩二合底金剛法嚩日囉二合引達麼素薩怛嚩二合􅚼㗚他二合嚩日囉二合引鉢摩素引馱迦盧引計濕嚩二合囉蘇嚩日囉二合引乞灑二合嚩日囉二合尼怛囉二合金剛利嚩日囉二合底乞灑拏三合摩訶引野引跢嚩日囉二合引俱舍摩訶引庾馱𤚥殂室哩二合嚩日囉二合誐引鼻􅝩哩耶二合嚩日囉二合沒悌金剛因嚩日囉二合引係都摩訶引莽拏嚩日囉二合引作羯囉二合摩訶引曩野蘇鉢囉二合嚩㗚多二合曩嚩日嚧二合多他嚩日囉曼拏金剛語嚩日囉二合婆引灑素尾儞也二合引誐囉也三合嚩日囉二合惹引波蘇悉提捺阿嚩引佐嚩日囉二合尾儞也二合誐囉二合嚩日囉二合婆引娑金剛業嚩日囉二合羯麼蘇嚩日囉二合枳惹二合羯麼嚩日囉二合蘇薩􅞣嚩誐嚩日囉母懼引摩護引捺引􅝩哩耶二合嚩日囉二合尾濕嚩金剛護嚩日囉二合囉乞叉二合摩訶吠􅝩哩耶二合嚩日囉二合嚩摩二合摩訶引涅哩二合捺奴􅝱哩庾二合馱曩蘇尾引􅝩哩耶二合誐囉嚩日囉二合尾􅝩㗚耶二合金剛牙嚩日囉二合引藥乞灑二合摩護引波野嚩日囉二合能瑟吒囉三合摩訶引婆野摩引囉鉢囉二合摩儞嚩日嚧二合誐囉二合嚩日囉二合讚拏金剛拳嚩日囉二合散地蘇婆引尼𠆙嚩日囉二合引滿馱鉢嚩二合謨引左迦嚩日囉二合母瑟吒耶三合誐囉二合三摩延嚩日囉二合謀瑟智二合此次有諸尊真言今非所用大概同世流布呪陀羅尼故又略之右大日劍印廣本者大師歸朝之日慧果和尚授之其略本者小野僧正所述相承之説如是今歲見多本傳寫差謬不少因茲對校印版令讀者易見然演奧鈔四十二釋轉字輪品歸敬偈云歸命菩提心等者以下六句讚梵本出小野僧正大日劍印中最極祕也茲覺慧運宗睿三師録所載毗盧遮那如來菩提心讚是也此兩本中無其梵讚蓋寫脫且有別本乎更可尋之時惟享和元辛酉年秋九月九日和州長谷寺歡喜院快道志
